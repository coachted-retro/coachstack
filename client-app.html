<!DOCTYPE html>
<html lang="en">
<head>
<script src="config.js"></script>
<script src="bundles-library.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1C1F26">
<title>My Training — CoachPilot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1C1F26;--ink2:#3D4149;--ink3:#767B87;--bg:#F7F5F1;--card:#FFFFFF;--line:#E4E1DA;--accent:#FF6B35;--accent-dk:#D9531F;--green:#2E7D5B;--green-lt:#E5F2EC;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;padding-bottom:40px}
.topbar{background:var(--ink);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.wordmark{font-family:'Space Grotesk';font-weight:700;font-size:16px}
.wordmark span{color:var(--accent)}
.topbar .trainer-name{font-size:12px;color:#B8BCC4}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
.section-label{font-family:'Space Grotesk';font-size:12px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.program-name{font-family:'Space Grotesk';font-size:18px;font-weight:600;margin-bottom:4px}
.program-desc{font-size:12.5px;color:var(--ink3);line-height:1.5;margin-bottom:12px}
.routine-pill{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:600;margin:0 6px 6px 0;cursor:pointer}
.routine-pill:hover{border-color:var(--accent)}
.ex-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.ex-row:last-child{border-bottom:none}
.log-btn{font-family:'Space Grotesk';font-size:12px;font-weight:600;background:var(--ink);color:#fff;border:none;padding:7px 12px;border-radius:7px;cursor:pointer}
.log-btn.logged{background:var(--green)}
.btn-primary{width:100%;font-family:'Space Grotesk';font-weight:600;font-size:14px;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:9px;cursor:pointer;margin-top:12px}
.btn-primary:hover{background:var(--accent-dk)}
.empty{text-align:center;padding:40px 20px;color:var(--ink3)}
</style>
</head>
<body>
<div class="topbar">
  <div class="wordmark">Coach<span>Pilot</span></div>
  <div class="trainer-name" id="trainerName"></div>
</div>
<div class="wrap">
  <div class="card" id="programCard">
    <div class="section-label">Your Program</div>
    <div id="programContent">Loading...</div>
  </div>
</div>
<script>
const WORKER = COACHPILOT_WORKER_URL;
let SESSION = null, CURRENT_BUNDLE = null, ACTIVE_ROUTINE_IDX = null;

(function(){
  const saved = localStorage.getItem('coachpilot_client_session');
  if (!saved) { location.href = 'client-login.html'; return; }
  try { SESSION = JSON.parse(saved); } catch(e) { location.href = 'client-login.html'; return; }
  loadMe();
})();

async function loadMe(){
  try {
    const r = await fetch(WORKER + '/client/me?token=' + encodeURIComponent(SESSION.token));
    const d = await r.json();
    if (!d.ok) { location.href = 'client-login.html'; return; }
    if (d.trainer) document.getElementById('trainerName').textContent = d.trainer.business_name || '';
    renderProgram(d.program);
  } catch(e) {
    document.getElementById('programContent').innerHTML = `<div class="empty">Couldn't load your program — check your connection and refresh.</div>`;
  }
}

function renderProgram(program){
  const contentEl = document.getElementById('programContent');
  if (!program) {
    contentEl.innerHTML = `<div class="empty">No program assigned yet — your coach will set one up for you soon.</div>`;
    return;
  }
  CURRENT_BUNDLE = BUNDLES.find(b => b.id === program.bundle_id);
  if (!CURRENT_BUNDLE) {
    contentEl.innerHTML = `<div class="empty">Your assigned program (${esc(program.bundle_name)}) couldn't be found in the catalog — let your coach know.</div>`;
    return;
  }
  contentEl.innerHTML = `
    <div class="program-name">${CURRENT_BUNDLE.icon} ${esc(CURRENT_BUNDLE.name)}</div>
    <div class="program-desc">${esc(CURRENT_BUNDLE.desc)}</div>
    <div id="routinePills">${CURRENT_BUNDLE.routines.map((r, i) => `<span class="routine-pill" onclick="showRoutine(${i})">${esc(r.label)}</span>`).join('')}</div>
    <div id="routineDetail" style="margin-top:14px"></div>
  `;
}

function showRoutine(idx){
  ACTIVE_ROUTINE_IDX = idx;
  const routine = CURRENT_BUNDLE.routines[idx];
  const detailEl = document.getElementById('routineDetail');
  detailEl.innerHTML = `
    <div class="section-label" style="margin-top:6px">${esc(routine.label)}</div>
    ${routine.exercises.map((ex, i) => `
      <div class="ex-row">
        <div>
          <div style="font-weight:600">${esc(ex.name)}</div>
          <div style="color:var(--ink3);font-size:12px">${ex.sets ? esc(String(ex.sets)) + ' sets × ' + esc(String(ex.reps)) : ''}${ex.rest ? ' · Rest ' + esc(ex.rest) : ''}</div>
        </div>
      </div>`).join('')}
    <button class="btn-primary" onclick="logWorkout()">Log This Workout</button>
  `;
}

async function logWorkout(){
  if (ACTIVE_ROUTINE_IDX === null) return;
  const routine = CURRENT_BUNDLE.routines[ACTIVE_ROUTINE_IDX];
  try {
    const r = await fetch(WORKER + '/client/log-workout', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token: SESSION.token, log_date: new Date().toISOString().slice(0,10), routine_label: routine.label, bundle_id: CURRENT_BUNDLE.id, exercises: routine.exercises.map(e => e.name) })
    });
    const d = await r.json();
    if (!d.ok) { alert(d.error || 'Could not log workout.'); return; }
    alert('Workout logged — nice work.');
  } catch(e) {
    alert('Connection error, try again.');
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
