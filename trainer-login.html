<!DOCTYPE html>
<html lang="en">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1C1F26">
<title>Sign In — CoachPilot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1C1F26;--ink2:#3D4149;--ink3:#767B87;--bg:#F7F5F1;--card:#FFFFFF;--line:#E4E1DA;--accent:#FF6B35;--accent-dk:#D9531F;--green:#2E7D5B;--green-lt:#E5F2EC;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{max-width:400px;width:100%}
.wordmark{font-family:'Space Grotesk';font-weight:700;font-size:22px;text-align:center;margin-bottom:4px;letter-spacing:-.3px}
.wordmark span{color:var(--accent)}
.tagline{text-align:center;font-size:12.5px;color:var(--ink3);margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 24px}
h1{font-family:'Space Grotesk';font-size:19px;font-weight:600;margin-bottom:6px}
.sub{font-size:13px;color:var(--ink3);margin-bottom:22px}
.field{margin-bottom:14px}
label{font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:6px}
input{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:11px 12px;font-family:'Inter';font-size:14px;color:var(--ink);background:#fff}
input:focus{outline:none;border-color:var(--accent)}
.submit-btn{width:100%;font-family:'Space Grotesk';font-size:15px;font-weight:600;background:var(--ink);color:#fff;border:none;padding:13px;border-radius:9px;cursor:pointer;margin-top:6px}
.submit-btn:hover{background:var(--accent-dk)}
.submit-btn:disabled{background:#C7C4BC;cursor:not-allowed}
.err{background:#FDEDE7;color:var(--accent-dk);border:1px solid #F5C6B0;border-radius:8px;padding:9px 12px;font-size:12px;margin-top:14px;display:none}
.footer{text-align:center;font-size:12.5px;color:var(--ink3);margin-top:18px}
.footer a{color:var(--accent-dk);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="wordmark">Coach<span>Pilot</span></div>
  <div class="tagline">Run your clients. Not your software bill.</div>
  <div class="card">
    <h1>Sign in</h1>
    <div class="sub">Welcome back — let's see how your clients are doing.</div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="tEmail" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="tPassword" autocomplete="current-password">
    </div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="err" id="errBox"></div>
  </div>
  <div class="footer">New here? <a href="trainer-signup.html">Create your account</a></div>
</div>
<script>
const WORKER = COACHPILOT_WORKER_URL;
(function(){
  const saved = localStorage.getItem('coachpilot_trainer_session');
  if (saved) { try { JSON.parse(saved); location.href = 'trainer-dashboard.html'; } catch(e) { localStorage.removeItem('coachpilot_trainer_session'); } }
})();
async function doLogin(){
  const email = document.getElementById('tEmail').value.trim();
  const password = document.getElementById('tPassword').value;
  const errEl = document.getElementById('errBox');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = 'Enter your email and password.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const r = await fetch(WORKER + '/trainer/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
    const d = await r.json();
    if (!d.ok) { errEl.textContent = d.error || 'Invalid email or password.'; errEl.style.display = 'block'; btn.disabled=false; btn.textContent='Sign In'; return; }
    localStorage.setItem('coachpilot_trainer_session', JSON.stringify({ token: d.token, trainer_id: d.trainer_id, business_name: d.business_name, full_name: d.full_name }));
    location.href = 'trainer-dashboard.html';
  } catch(e) {
    errEl.textContent = 'Connection error, try again.'; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
