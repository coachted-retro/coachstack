<!DOCTYPE html>
<html lang="en">
<head>
<script src="config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1C1F26">
<title>Create Your Account — CoachPilot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1C1F26;--ink2:#3D4149;--ink3:#767B87;--bg:#F7F5F1;--card:#FFFFFF;--line:#E4E1DA;--accent:#FF6B35;--accent-dk:#D9531F;--green:#2E7D5B;--green-lt:#E5F2EC;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{max-width:420px;width:100%}
.wordmark{font-family:'Space Grotesk';font-weight:700;font-size:22px;text-align:center;margin-bottom:4px;letter-spacing:-.3px}
.wordmark span{color:var(--accent)}
.tagline{text-align:center;font-size:12.5px;color:var(--ink3);margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 24px}
h1{font-family:'Space Grotesk';font-size:19px;font-weight:600;margin-bottom:6px}
.sub{font-size:13px;color:var(--ink3);margin-bottom:22px}
.field{margin-bottom:14px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:6px}
input{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:11px 12px;font-family:'Inter';font-size:14px;color:var(--ink);background:#fff}
input:focus{outline:none;border-color:var(--accent)}
.hint{font-size:11px;color:var(--ink3);margin-top:5px}
.submit-btn{width:100%;font-family:'Space Grotesk';font-size:15px;font-weight:600;background:var(--ink);color:#fff;border:none;padding:13px;border-radius:9px;cursor:pointer;margin-top:6px}
.submit-btn:hover{background:var(--accent-dk)}
.submit-btn:disabled{background:#C7C4BC;cursor:not-allowed}
.err{background:#FDEDE7;color:var(--accent-dk);border:1px solid #F5C6B0;border-radius:8px;padding:9px 12px;font-size:12px;margin-top:14px;display:none}
.footer{text-align:center;font-size:12.5px;color:var(--ink3);margin-top:18px}
.footer a{color:var(--accent-dk);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="wordmark">Coach<span>Pilot</span></div>
  <div class="tagline">One flat rate. Every client. No penalty for growing.</div>
  <div class="card">
    <h1>Create your account</h1>
    <div class="sub">Set up your roster in under a minute.</div>
    <div class="field">
      <label>Your Business / Coaching Name</label>
      <input type="text" id="fBusiness" placeholder="e.g. Marcus Fitness Coaching">
    </div>
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="fName" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="fEmail" autocomplete="email">
    </div>
    <div class="field">
      <label>Phone (optional)</label>
      <input type="tel" id="fPhone" autocomplete="tel">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="fPassword" autocomplete="new-password">
      <div class="hint">At least 8 characters.</div>
    </div>
    <button class="submit-btn" id="signupBtn" onclick="doSignup()">Create Account</button>
    <div class="err" id="errBox"></div>
  </div>
  <div class="footer">Already have an account? <a href="trainer-login.html">Sign in</a></div>
</div>
<script>
const WORKER = COACHPILOT_WORKER_URL;
async function doSignup(){
  const business_name = document.getElementById('fBusiness').value.trim();
  const full_name = document.getElementById('fName').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const password = document.getElementById('fPassword').value;
  const errEl = document.getElementById('errBox');
  errEl.style.display = 'none';
  if (!business_name || !full_name || !email || !password) { errEl.textContent = 'Please fill in all required fields.'; errEl.style.display = 'block'; return; }
  if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const r = await fetch(WORKER + '/trainer/signup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({business_name, full_name, email, phone: phone || null, password}) });
    const d = await r.json();
    if (!d.ok) { errEl.textContent = d.error || 'Could not create account.'; errEl.style.display = 'block'; btn.disabled=false; btn.textContent='Create Account'; return; }
    localStorage.setItem('coachpilot_trainer_session', JSON.stringify({ token: d.token, trainer_id: d.trainer_id, business_name: d.business_name, full_name }));
    location.href = 'trainer-dashboard.html';
  } catch(e) {
    errEl.textContent = 'Connection error, try again.'; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
